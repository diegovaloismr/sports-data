# Cadastro das modalidades da FCA e a variável de ambiente que aponta
# para o Sheet ID da respectiva planilha de matrícula.
#
# "slug" é o identificador interno usado em todo o sistema (banco de dados,
# mapeamento de locais, parser de turma). Não altere um slug depois que já
# existirem dados sincronizados sob ele — isso quebraria os vínculos.
#
# "aliases" (opcional) lista outras grafias do nome da modalidade que
# aparecem nas planilhas de Vagas/Locais (ex: "Triatlo" em vez de
# "Triathlon"). Variações só de acentuação (Tênis/Tenis) já são resolvidas
# automaticamente e não precisam de alias.

modalidades:
  - slug: natacao
    nome: "Natação"
    env_sheet_id: FCA_SHEET_ID_NATACAO
  - slug: futebol
    nome: "Futebol"
    env_sheet_id: FCA_SHEET_ID_FUTEBOL
  - slug: basquete
    nome: "Basquete"
    env_sheet_id: FCA_SHEET_ID_BASQUETE
  - slug: ginastica
    nome: "Ginástica"
    env_sheet_id: FCA_SHEET_ID_GINASTICA
  - slug: voleibol
    nome: "Voleibol"
    env_sheet_id: FCA_SHEET_ID_VOLEIBOL
  - slug: jiujitsu
    nome: "Jiu-jitsu"
    env_sheet_id: FCA_SHEET_ID_JIUJITSU
  - slug: tenis
    nome: "Tênis"
    env_sheet_id: FCA_SHEET_ID_TENIS
  - slug: triathlon
    nome: "Triathlon"
    aliases: ["Triatlo"]
    env_sheet_id: FCA_SHEET_ID_TRIATHLON

# Duas planilhas dedicadas (em vez de uma mestre com 2 abas). Cada uma é
# lida pela primeira aba - não é preciso saber o nome exato da aba.
planilha_vagas:
  env_sheet_id: FCA_SHEET_ID_VAGAS
planilha_locais:
  env_sheet_id: FCA_SHEET_ID_LOCAIS
